version: '3.8'

services:
  rag_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_api_service
    ports:
      - "8081:8080"
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_URL=http://qdrant_db:6333
    depends_on:
      - mysql_db
      - qdrant_db
    restart: unless-stopped
    networks:
      - backend

  mysql_db:
    image: mysql:8.0
    container_name: coldstorage_db
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: coldstorage_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - backend
  qdrant_db:
    image: qdrant/qdrant:latest
    container_name: qdrant_vector_db
    ports:
      - "6333:6333" #Port REST API
      - "6334:6334" #Port gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    networks:
      - backend
      
volumes:
  mysql_data:
  qdrant_storage:
networks:
  backend: